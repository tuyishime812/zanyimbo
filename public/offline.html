<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FDB913">
  <title>Offline - DGT Sounds</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a0f2e 0%, #2d1f4e 50%, #4a3b6e 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .offline-container {
      text-align: center;
      max-width: 500px;
    }

    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ff6b35;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: #ff6b35;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .retry-btn:hover {
      background: #ff8c61;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
    }

    .tips {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      text-align: left;
    }

    .tips h3 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: #ff6b35;
    }

    .tips ul {
      list-style: none;
      padding-left: 0;
    }

    .tips li {
      padding: 0.5rem 0;
      color: #a0a0a0;
      font-size: 0.875rem;
    }

    .tips li:before {
      content: '✓ ';
      color: #ff6b35;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }

      .offline-icon {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📶</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Some features may not be available until you're back online.
    </p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>

    <div class="tips">
      <h3>What you can still do:</h3>
      <ul>
        <li>Play previously cached songs</li>
        <li>Browse cached album art</li>
        <li>View your saved playlists</li>
        <li>Access downloaded content</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload()
    })

    // Check connection status periodically
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload()
      }
    }, 5000)
  </script>
</body>
</html>
