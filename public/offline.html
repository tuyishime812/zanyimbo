<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Zanyimbo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a0f2e 0%, #2d1f4e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    
    .offline-container {
      max-width: 500px;
    }
    
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ff6b35;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2rem;
    }
    
    .offline-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .btn {
      padding: 1rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #ff8c61);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      margin-top: 2rem;
      font-size: 0.9rem;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff6b35;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .cached-info {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .cached-info h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: #ff6b35;
    }
    
    .cached-info ul {
      list-style: none;
      text-align: left;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .cached-info li {
      padding: 0.25rem 0;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      No internet connection detected. Don't worry! 
      You can still access your cached music and browse the app.
    </p>
    
    <div class="offline-actions">
      <button class="btn btn-primary" onclick="window.location.reload()">
        🔄 Try Again
      </button>
      <a href="/" class="btn btn-secondary">
        🏠 Go Home
      </a>
    </div>
    
    <div class="status-indicator">
      <span class="status-dot"></span>
      <span>Attempting to reconnect...</span>
    </div>
    
    <div class="cached-info">
      <h3>💾 Available Offline</h3>
      <ul>
        <li>✅ Previously loaded songs</li>
        <li>✅ App interface</li>
        <li>✅ Your liked songs</li>
        <li>✅ Cached album art</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Check connection status
    window.addEventListener('online', () => {
      window.location.reload()
    })
    
    // Update status periodically
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload()
      }
    }, 5000)
  </script>
</body>
</html>
